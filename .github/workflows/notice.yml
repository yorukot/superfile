name: NOTICE Check

on:
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'notice.tmpl'
      - 'NOTICE.md'
      - 'Makefile'
      - 'scripts/generate_notice.go'
      - '.github/workflows/notice.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'notice.tmpl'
      - 'NOTICE.md'
      - 'Makefile'
      - 'scripts/generate_notice.go'
      - '.github/workflows/notice.yml'

permissions:
  contents: read

jobs:
  notice:
    name: Check NOTICE.md is up to date
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ${{ runner.temp }}/gomodcache
            ~/go/bin
          key: ${{ runner.os }}-notice-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-notice-

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0
        env:
          GOMODCACHE: ${{ runner.temp }}/gomodcache

      - name: Generate NOTICE.md
        run: make notice
        env:
          GOMODCACHE: ${{ runner.temp }}/gomodcache

      - name: Check NOTICE.md
        run: |
          git diff --exit-code -- NOTICE.md || {
            echo "::error::NOTICE.md is out of date. Run 'make notice' and commit the updated file."
            exit 1
          }
